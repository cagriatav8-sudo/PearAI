<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PEAR-AI — PEAR OFFICIAL REAL-TIME</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --main: #00aaff;
  --accent: #00eeff;
  --bg: #020810;
  --panel: rgba(4, 15, 30, 0.98);
  --glow: rgba(0,170,255,0.3);
  --text-body: #c0e8ff;
  --header-bg: rgba(2,8,16,0.92);
  --header-border: rgba(0,170,255,0.15);
  --news-bg: var(--panel);
  --news-border: rgba(0,170,255,0.25);
  --switch-wrap-border: rgba(0,170,255,0.2);
  --menu-item-border: rgba(0,170,255,0.08);
  --drawer-sep: rgba(0,170,255,0.1);
  --orb-ring-border: var(--main);
  --input-placeholder: rgba(0,170,255,0.35);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body { background:var(--bg); color:var(--text-body); font-family:'Rajdhani',sans-serif; overflow:hidden; height:100vh; width:100vw; touch-action:none; transition: background 1.5s ease, color 1.5s ease; }

/* ── INTRO ── */
#intro { position:fixed; inset:0; z-index:9999; background:#000; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px; transition:opacity 1s; }
.inf-logo { width:120px; stroke:var(--main); stroke-width:2; fill:none; animation:draw 3s infinite alternate; }
@keyframes draw { 0%{stroke-dasharray:0 500;}100%{stroke-dasharray:500 0;filter:drop-shadow(0 0 30px var(--main));} }
.intro-text { font-family:'Orbitron'; color:var(--main); font-size:12px; letter-spacing:4px; opacity:0.6; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:0.3;}50%{opacity:1;} }

/* ── APP ── */
#app { opacity:0; height:100%; display:flex; flex-direction:column; transition:opacity 1.5s; }

/* ── HEADER ── */
header {
  padding: 10px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--header-bg);
  border-bottom: 1px solid var(--header-border);
  z-index: 100;
  gap: 10px;
  transition: background 1.5s ease, border-color 1.5s ease;
}
.header-left { display:flex; align-items:center; gap:12px; }
.header-right { display:flex; align-items:center; gap:10px; }

#menu-btn {
  cursor:pointer; font-size:24px; color:var(--main);
  width:36px; height:36px; display:flex; align-items:center; justify-content:center;
  border-radius:10px; border:1px solid rgba(0,170,255,0.2);
  transition: all 0.3s, color 1.5s ease; flex-shrink:0;
}
#menu-btn:hover { background:rgba(0,170,255,0.1); }

.logo-text { font-family:'Orbitron'; color:var(--main); letter-spacing:2px; font-weight:bold; font-size:13px; white-space:nowrap; transition: color 1.5s ease; }

/* Theme buttons */
.theme-btns { display:flex; gap:4px; }
.theme-dot {
  width:18px; height:18px; border-radius:50%; cursor:pointer;
  border:2px solid transparent; transition:transform 0.2s, border-color 0.2s;
}
.theme-dot:hover { transform:scale(1.3); border-color:white; }
.theme-dot.active { border-color:white; transform:scale(1.2); }

/* Battery widget */
#bat-widget {
  display:flex; align-items:center; gap:6px;
  background:rgba(0,0,0,0.4); border:1px solid rgba(0,170,255,0.25);
  border-radius:10px; padding:4px 10px; font-size:11px; color:var(--main);
  white-space:nowrap; transition: background 1.5s ease, border-color 1.5s ease, color 1.5s ease;
}
.bat-icon { position:relative; width:24px; height:13px; border:2px solid var(--main); border-radius:3px; transition: border-color 1.5s ease; }
.bat-icon::after { content:''; position:absolute; right:-5px; top:3px; width:3px; height:7px; background:var(--main); border-radius:0 2px 2px 0; transition: background 1.5s ease; }
.bat-fill { height:100%; border-radius:1px; transition:width 0.8s ease, background 1.5s ease; }

#rgb-bar {
  height:3px; width:100%;
  background:linear-gradient(90deg, #ff0000, #ff8800, #ffff00, #00ff00, #00ffff, #0088ff, #ff00ff, #ff0000);
  background-size:200% 100%;
  animation:rgbShift 4s linear infinite;
  transition:opacity 0.3s;
}
@keyframes rgbShift { 0%{background-position:0% 50%;}100%{background-position:200% 50%;} }

#clock { font-family:'Orbitron'; font-size:13px; color:var(--main); white-space:nowrap; transition: color 1.5s ease; }

/* ── DRAWER ── */
#drawer {
  position:fixed; top:0; left:-320px; width:280px; height:100%;
  background:var(--panel); z-index:2000; padding:20px;
  border-right:1px solid var(--main); box-shadow:10px 0 40px #000;
  transition:left 0.4s cubic-bezier(.4,0,.2,1), background 1.5s ease, border-color 1.5s ease;
  display:flex; flex-direction:column; gap:10px;
}
.drawer-open { left:0 !important; }
.drawer-title { font-family:'Orbitron'; color:var(--main); font-size:12px; letter-spacing:3px; margin-bottom:6px; transition: color 1.5s ease; }
.menu-item {
  padding:13px 15px; border-radius:14px;
  background:rgba(255,255,255,0.03); cursor:pointer;
  display:flex; align-items:center; justify-content:space-between;
  border:1px solid var(--menu-item-border); transition:background 0.2s, border-color 1.5s ease;
  font-size:13px;
}
.menu-item:hover { background:rgba(0,170,255,0.08); }
.menu-sep { height:1px; background:var(--drawer-sep); margin:6px 0; transition: background 1.5s ease; }

/* ── MAIN CONTENT ── */
.main-content { flex:1; position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px; overflow:hidden; }

.draggable {
  position:absolute; width:92%; max-width:380px;
  background:var(--panel); border:1px solid var(--main);
  border-radius:20px; padding:18px; z-index:500;
  backdrop-filter:blur(25px); box-shadow:0 0 40px rgba(0,0,0,0.8);
  cursor:move; display:none;
  transition: border-color 1.5s ease, box-shadow 1.5s ease, background 1.5s ease;
}
.panel-header { display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px solid rgba(255,255,255,0.08); padding-bottom:6px; pointer-events:none; color:var(--main); font-size:11px; letter-spacing:2px; transition: color 1.5s ease; }
.close-btn { pointer-events:auto; cursor:pointer; color:var(--main); font-size:18px; opacity:0.7; transition: color 1.5s ease; }

.orb-wrap { position:relative; }
.orb-ring {
  position:absolute; border-radius:50%; border:1px solid;
  border-color:var(--main); opacity:0.2;
  animation:orbPulse 3s ease-in-out infinite;
  transition: border-color 1.5s ease;
}
.orb-ring:nth-child(1) { width:170px; height:170px; top:-15px; left:-15px; animation-delay:0s; }
.orb-ring:nth-child(2) { width:200px; height:200px; top:-30px; left:-30px; animation-delay:1s; }
@keyframes orbPulse { 0%,100%{opacity:0.1;transform:scale(1);}50%{opacity:0.3;transform:scale(1.04);} }

.orb-btn {
  width:140px; height:140px; border-radius:50%;
  border:2px solid var(--main); display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 25px var(--glow); cursor:pointer; z-index:10; position:relative;
  transition: box-shadow 0.3s, border-color 1.5s ease;
}
.orb-btn:hover { box-shadow:0 0 40px var(--main), 0 0 80px var(--glow); }
.listening { box-shadow:0 0 60px var(--main), inset 0 0 30px var(--glow) !important; }
.orb-inner { width:90px; height:90px; border-radius:50%; background:radial-gradient(circle, var(--main), transparent 85%); opacity:0.5; pointer-events:none; }

/* ── CHAT INPUT ── */
#chat-input { width:100%; background:rgba(0,0,0,0.5); border:1px solid var(--main); color:white; padding:11px 14px; border-radius:12px; outline:none; margin-top:10px; font-family:'Rajdhani'; font-size:14px; }
#chat-input::placeholder { color:var(--input-placeholder); }

body.theme-white {
  --main: #1a56db;
  --bg: #f0f4ff;
  --panel: rgba(255,255,255,0.97);
  --text-body: #1e293b;
}
</style>
</head>
<body>

<div id="intro">
  <svg class="inf-logo" viewBox="0 0 100 100">
    <!-- Pear Logo Path -->
    <path d="M50,15 Q65,15 72,30 Q80,50 65,65 Q45,65 30,50 Q20,30 35,20 Q45,15 50,15 Z" />
  </svg>
  <div class="intro-text">SİSTEM BAŞLATILIYOR...</div>
</div>

<div id="overlay" onclick="closeDrawer()"></div>

<div id="drawer">
  <div class="drawer-title">⚙ PROTOKOL PANELİ</div>
  <div class="menu-sep"></div>
  <div class="menu-item" onclick="location.reload()">🔄 Sistemi Yenile</div>
  <div style="margin-top:auto; font-weight:bold; color:var(--main); text-align:center; font-size:11px; letter-spacing:2px; opacity:0.5;">BY ÇAĞRI ATAV</div>
</div>

<div id="app">
  <div id="rgb-bar"></div>
  <header>
    <div class="header-left">
      <div id="menu-btn" onclick="toggleDrawer()">☰</div>
      <div class="logo-text">PEAR-AI</div>
    </div>
    <div id="clock">00:00</div>
    <div class="header-right">
      <div id="bat-widget">
        <div class="bat-icon"><div class="bat-fill" id="bat-fill"></div></div>
        <span id="bat-pct">--</span>
      </div>
    </div>
  </header>

  <div class="main-content">
    <div id="transcript-area" class="draggable" style="top:80px;left:10px;display:block;">
      <div class="panel-header">
        <span>◈ SÖZCÜK ALANI</span>
        <span class="close-btn" onclick="closeBox('transcript-area')">✖</span>
      </div>
      <p id="transcript-text" style="font-size:14px;line-height:1.5;">PEAR-AI Hazır.</p>
    </div>

    <div class="orb-wrap">
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <div class="orb-btn" id="main-orb" onclick="toggleMic()">
        <div class="orb-inner"></div>
      </div>
    </div>
    <div id="status-line" style="margin-top:20px; font-size:12px; letter-spacing:2px;">PEAR OFFICIAL READY</div>
  </div>
</div>

<script>
let isListening = false;
function toggleDrawer() {
  document.getElementById('drawer').classList.toggle('drawer-open');
  document.getElementById('overlay').classList.toggle('overlay-active');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('drawer-open');
  document.getElementById('overlay').classList.remove('overlay-active');
}
function closeBox(id) { document.getElementById(id).style.display='none'; }
function toggleMic() {
  isListening = !isListening;
  document.getElementById('main-orb').classList.toggle('listening', isListening);
  document.getElementById('status-line').textContent = isListening ? '● DİNLİYORUM...' : 'PEAR OFFICIAL READY';
}
function updateClock() {
  document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(updateClock, 1000);
setTimeout(() => {
  document.getElementById('intro').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('intro').style.display = 'none';
    document.getElementById('app').style.opacity = '1';
  }, 1000);
}, 2000);
</script>
</body>
</html>
